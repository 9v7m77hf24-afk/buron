<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Guide du Tournel</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="icon" href="./img/logo.png" type="image/png"/>

</head>

<body>
  <!-- Persistent background, never reloaded between pages -->
  <div class="background"></div>

  <header class="nav">
    <a href="#" data-page="home" class="nav-logo-link" aria-label="Go to home">
      <img src="./img/logo-192.png" alt="Logo" class="nav-logo">
    </a>
  </header>

  <main id="content">
      <!-- Page content gets injected here by router.js -->
  </main>

  <footer class="bottom-nav" id="bottomNav">
    <!-- Arrows &#9664/&#9654 -->
    <button class="nav-arrow" id="navBack" aria-label="Go back">&#10094;</button>
    
    <a href="#" data-page="home" class="nav-link">
      <img src="./img/house_br.png" alt="" class="nav-icon">
      <!--<span>Accueil</span>-->
    </a>
    <!--
    <a href="#" data-page="about" class="nav-link">Infos</a>
    -->
    
    <button class="nav-arrow" id="navForward" aria-label="Go forward">&#10095;</button>
  </footer>

  <!-- Order matters -->
  <script src="./js/gallery_carousel.js"></script>
  <script src="./js/router.js"></script>  
  <script src="./js/header_nav.js"></script> 
  <script src="./js/footer_nav.js"></script>  
  <script src="./js/main.js"></script>
</body>
</html>
